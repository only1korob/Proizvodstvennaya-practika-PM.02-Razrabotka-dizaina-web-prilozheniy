<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Вход — MyBakery</title>
    <style>
        body { background-color: #1a1a1a; color: #e0e0e0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #2d2d2d; padding: 40px; border-radius: 8px; width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #3d3d3d; border: 1px solid #4d4d4d; color: white; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #c29d0b; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        a { color: #c29d0b; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Вход</h2>
        <p>Введите логин и пароль</p>
        <input type="text" placeholder="Логин">
        <input type="password" placeholder="Пароль">
        <button>Войти</button>
        <p><a href="/register">Создать аккаунт</a></p>
    </div>
</body>
</html>
