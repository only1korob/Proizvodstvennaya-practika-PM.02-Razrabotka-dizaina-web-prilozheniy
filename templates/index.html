<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MyBakery — Главная</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="nav">
        <a href="/">ГЛАВНАЯ</a>
        <a href="/login">ВХОД</a>
        <a href="/register">РЕГИСТРАЦИЯ</a>
        <a href="/dashboard">ОТЧЕТ (БД)</a>
    </div>

    <div class="header" style="text-align: center; padding: 40px; background: #8d6e63; color: white;">
        <h1>🍞 Добро пожаловать в MyBakery</h1>
        <p>Свежая выпечка из нашей базы данных</p>
    </div>

    <div class="container" style="display: flex; justify-content: center; flex-wrap: wrap; padding: 20px;">
        {% for p in products %}
        <div class="card" style="margin: 15px;">
            <h2>{{ p.title }}</h2>
            <p class="price">{{ p.price }} ₽</p>
            <p>В наличии: {{ p.amount }} шт.</p>
            <button style="background: #6d4c41; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer;">
                Купить
            </button>
        </div>
        {% else %}
        <div style="text-align: center; width: 100%;">
            <p>Товаров пока нет. Добавьте их через консоль или проверьте базу!</p>
        </div>
        {% endfor %}
    </div>

</body>
</html>
